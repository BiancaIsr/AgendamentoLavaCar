name: CI/CD Pipeline Agendamento Lava Car

on:
  push:
    branches: [ main, feat-ci/cd ]
  pull_request:
    branches: [ main ]

jobs:
  # JOB 1: CI (Integração Contínua) - Testa se o código está quebrado
  integracao_continua:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Instalar Dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Rodar Testes
        run: |
          python manage.py test

  # JOB 2: CD (Entrega Contínua) - Testa se o Docker monta a imagem
  entrega_continua:
    needs: integracao_continua
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Validar Build do Docker
        run: |
          docker build -t agendamento-lavacar:latest .